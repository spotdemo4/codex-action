name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# yaml-language-server-disable is not allowed
enable-openid-connect: true

jobs:
  linux:
    # zizmor: ignore[excessive-permissions]
    runs-on: ubuntu-24.04
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@1443d93dfa3ca2f043b37f848631d6ac5563b0ec # v1.56.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          token: ${{ secrets.DOCTOR_TOKEN }}
          niks3_url: https://niks3.trev.zip
          shell: release
          fetch_depth: 0

      - name: Release to Forgejo
        run: flake-release
        env:
          REGISTRY: trev.zip
          GITHUB_TOKEN: ${{ secrets.DOCTOR_TOKEN }}
          REGISTRY_PASSWORD: ${{ secrets.PACKAGE_TOKEN }}
          DELETE_OLD_RELEASE_ARTIFACTS: true
          PACKAGES: |
            appimages.x86_64-linux.default.x86_64-unknown-linux-gnu
            images.x86_64-linux.default.x86_64-unknown-linux-gnu

      - name: Release to NPM
        env:
          SERVER_URL: ${{ forgejo.SERVER_URL }}
          REPOSITORY_OWNER: ${{ forgejo.REPOSITORY_OWNER }}
          PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        run: | # zizmor: ignore[use-trusted-publishing]
          npm config set @trev:registry "${SERVER_URL}/api/packages/${REPOSITORY_OWNER}/npm/"
          npm config set "//trev.zip/api/packages/${REPOSITORY_OWNER}/npm/:_authToken=${PACKAGE_TOKEN}"
          npm ci
          npm publish --scope=@trev --registry="${SERVER_URL}/api/packages/${REPOSITORY_OWNER}/npm/"
