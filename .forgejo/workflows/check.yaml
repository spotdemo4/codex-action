name: check

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}

# yaml-language-server-disable is not allowed
enable-openid-connect: true

jobs:
  check:
    # zizmor: ignore[excessive-permissions]
    runs-on: ubuntu-24.04
    steps:
      - name: Initialize
        uses: spotdemo4/nix-init@1443d93dfa3ca2f043b37f848631d6ac5563b0ec # v1.56.0
        with:
          github_token: ${{ secrets.GH_TOKEN }}
          niks3_url: https://niks3.trev.zip

      - name: Check
        run: nix flake check

  action:
    # zizmor: ignore[excessive-permissions]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run action
        uses: ./. # zizmor: ignore[unpinned-uses]
        with:
          auth: ${{ secrets.CODEX_ACTION_AUTH }}
          token: ${{ secrets.CODEX_TOKEN }}
          model: gpt-5.3-codex-spark
          dry-run: true
          prompt: |
            You must modify the working tree as the only task.
            Create or overwrite the relative path `.codex-action-check.txt` with exactly this single line:
            codex-action dry-run check
            Do not use an absolute path for the file edit.
            If a file editing tool fails, use this shell command instead:
            printf '%s\n' 'codex-action dry-run check' > .codex-action-check.txt
            Do not finish until the file exists and `git status --porcelain` shows it as changed.

      - name: Verify dry-run change
        run: |
          test -f .codex-action-check.txt
          grep -qxF "codex-action dry-run check" .codex-action-check.txt
          if git diff --quiet HEAD^ HEAD -- .codex-action-check.txt; then
            echo ".codex-action-check.txt was not changed by the local dry-run commit"
            exit 1
          else
            status=$?
            if [ "$status" -ne 1 ]; then
              exit "$status"
            fi
          fi
