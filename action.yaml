name: codex action
description: use codex in a GitHub/Gitea/Forgejo action
author: trev

inputs:
  auth:
    description: Current base64-encoded Codex auth.json from a repository secret
    required: false
  auth-secret:
    description: Repository secret name to update with refreshed Codex auth
    required: false
    default: CODEX_ACTION_AUTH
  prompt:
    description: Prompt text, or a path to a file containing the prompt
    required: true
  model:
    description: Optional Codex model to use
    required: false
  token:
    description: GitHub, Gitea, or Forgejo token used for git and pull request APIs
    required: false
  client-id:
    description: GitHub App client ID used to create an installation token when token is omitted
    required: false
  private-key:
    description: GitHub App private key used to create an installation token when token is omitted
    required: false
  automerge:
    description: Set true to enable automerge, false to disable automerge, or omit for no-op
    required: false

runs:
  using: node24
  main: build/index.js
